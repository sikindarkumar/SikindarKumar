name: Generate Neon Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate snake animations
        uses: Platane/snk@v3

        with:
            github_user_name: ${{ github.repository_owner }}

        outputs: |

          dist/github-contribution-grid-snake.svg
          dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00F5FF&color_dots=%161B22,%0E4429,%006D32,%26A641,%39D353

      - name: Push to GitHub    
        uses: crazy-max/ghaction-github-pages@v3

        with:
            target_branch: output
            build_dir: dist
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
